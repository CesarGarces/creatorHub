services:
  - type: web
    name: creatorhub-api
    runtime: node
    plan: free
    buildCommand: pnpm install --force && pnpm turbo run build --filter=@creator-hub/api... && node -e "const pg = require('./packages/database/node_modules/pg'); const c = new pg.Client({connectionString: process.env.DATABASE_URL}); c.connect().then(() => c.query(\"UPDATE prisma_migrations SET rolled_back_at = NOW() WHERE migration_name = '20260619120000_restore_premium_enum' AND rolled_back_at IS NULL\")).then(() => c.end())" && packages/database/node_modules/.bin/prisma migrate deploy --schema=packages/database/prisma/schema.prisma && packages/database/node_modules/.bin/tsx packages/database/src/seed.ts
    startCommand: node apps/api/dist/main
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: creatorhub-assets
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
