services:
  - type: web
    name: creatorhub-api
    runtime: node
    plan: free
    buildCommand: pnpm install --force && NODE_OPTIONS="--max-old-space-size=1024" pnpm turbo run build --filter=@creator-hub/api... && npx playwright install --with-deps chromium && packages/database/node_modules/.bin/prisma migrate resolve --rolled-back 20260702000000_add_social_research_and_cache --schema=packages/database/prisma/schema.prisma && packages/database/node_modules/.bin/prisma migrate deploy --schema=packages/database/prisma/schema.prisma && packages/database/node_modules/.bin/tsx packages/database/src/seed.ts
    startCommand: node apps/api/dist/main
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: creatorhub-assets
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1024"
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: X_REDIRECT_URI
        value: "https://creatorhub-qtod.onrender.com/api/v1/social/x/callback"
      - key: X_SOCIAL_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: false
